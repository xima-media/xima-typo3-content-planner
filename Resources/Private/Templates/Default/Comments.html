<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true">

<div id="content-planner-comment-list" class="content-planner-comment-list" data-replies-expanded="{f:if(condition: '{repliesExpanded}', then: '1', else: '0')}">
    <f:if condition="{comments -> f:count()} || {filter.resolvedCount}">
        <form id="content-planner-comment-filter" class="content-planner-comment-filter" data-table="{table}" data-id="{id}">
            <div class="form-sort">
                <label for="content-planner-comment-filter-sort">Sort</label>
                <select id="content-planner-comment-filter-sort" name="sortComments"
                        class="form-select form-select-sm">
                    <f:for each="{0: {value: 'DESC', label: 'Newest'}, 1: {value: 'ASC', label: 'Oldest'}}" as="option">
                        <option value="{option.value}" {f:if(condition:
                        '{option.value} == {filter.sortComments}', then: 'selected', else: '')}>
                        {option.label}
                        </option>
                    </f:for>
                </select>
                <f:if condition="{shareUrl}">
                    <div class="dropdown">
                        <button type="button" class="btn btn-default btn-sm dropdown-toggle dropdown-toggle-no-chevron" data-bs-toggle="dropdown"
                                aria-expanded="false">
                            <core:icon identifier="actions-menu-alternative" size="small"/>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" data-share-modal-uri="{shareUrl}">
                                    <core:icon identifier="actions-link" size="small"/>
                                    <f:translate key="comment.actions.share"
                                                extensionName="XimaTypo3ContentPlanner"/>
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"/></li>
                            <li>
                                <f:if condition="{repliesExpanded}">
                                    <f:then>
                                        <button type="button" class="dropdown-item" data-toggle-replies-expanded="0">
                                            <core:icon identifier="actions-chevron-up" size="small"/>
                                            <f:translate key="comment.actions.replies.collapse"
                                                        extensionName="XimaTypo3ContentPlanner"/>
                                        </button>
                                    </f:then>
                                    <f:else>
                                        <button type="button" class="dropdown-item" data-toggle-replies-expanded="1">
                                            <core:icon identifier="actions-chevron-down" size="small"/>
                                            <f:translate key="comment.actions.replies.expand"
                                                        extensionName="XimaTypo3ContentPlanner"/>
                                        </button>
                                    </f:else>
                                </f:if>
                            </li>
                        </ul>
                    </div>
                </f:if>
            </div>
            <f:if condition="{filter.resolvedCount}">
                <div class="form-check form-switch">
                    <input type="checkbox" class="form-check-input" value="1"
                           id="content-planner-comment-filter-resolved"
                           name="showResolvedComments"
                           {f:if(condition: '{filter.showResolvedComments}', then: 'checked', else: '')}
                    />
                    <label for="content-planner-comment-filter-resolved">Show resolved comments <span
                            class="badge badge-secondary">{filter.resolvedCount}</span></label>
                </div>
            </f:if>
        </form>
    </f:if>

    <f:if condition="{comments -> f:count()}">
        <f:then>
            <f:for each="{comments}" as="record">
                <f:render partial="Comment" arguments="{comment: record, id: id, table: table, isReply: 0, showRecordInfo: 0, repliesExpanded: repliesExpanded}" />
            </f:for>
        </f:then>
        <f:else>
            <div class="content-planner-widget__empty content-planner-comment-empty">
                <f:render partial="Empty"/>
                <div class="text-center content-planner-comment-empty__text">
                    <f:format.raw>
                        <f:translate key="comment.empty" extensionName="XimaTypo3ContentPlanner"
                                    arguments="{0: '{newCommentUri}', 1: '{table}', 2: '{id}'}"/>
                    </f:format.raw>
                </div>
            </div>
        </f:else>
    </f:if>
</div>
